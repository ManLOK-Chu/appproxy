name: Build APK

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type'
        type: choice
        options:
          - release
          - debug
        default: release
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: tun2socks/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build tun2socks.aar
        run: |
          export PATH="$HOME/go/bin:$PATH"
          cd tun2socks
          go get
          gomobile init
          gomobile bind -o ../android/app/libs/tun2socks.aar -target android -androidapi 28 ./engine

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      - name: Build release APK
        if: github.event_name != 'pull_request'
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
            echo "flutter.keystore=upload-keystore.jks" > android/local.properties
          fi
          flutter build apk --release --split-per-abi \
            --build-name=0.2.1 \
            --dart-define=BUILD_DATE=$(date +%Y-%m-%d) \
            --obfuscate --split-debug-info ./build/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: appproxy-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
